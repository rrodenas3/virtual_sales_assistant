name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend
        run: pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check backend tests alembic ../mcp ../scripts

      - name: Test
        run: python -m pytest tests -q

      - name: Local eval harness
        run: python ../scripts/run_eval.py

      - name: Local readiness report
        run: python ../scripts/pilot_readiness_report.py --target local

      - name: Live data contract manifest
        run: python ../scripts/validate_live_data_contracts.py --manifest-only

      - name: Demo seed artifact
        run: python ../scripts/seed_demo_data.py --output-dir ../artifacts/demo-data/ci

      - name: MCP smoke
        run: python ../scripts/mcp_smoke.py

      - name: Readiness bundle
        run: python ../scripts/readiness_bundle.py --target local --output-dir ../artifacts/readiness/ci

      - name: Local handoff bundle
        run: python ../scripts/local_handoff.py --target local --skip-public-safety --output-dir ../artifacts/local-handoff/ci

      - name: Validation suite
        run: python ../scripts/validation_suite.py --target local --skip-public-safety --output-dir ../artifacts/validation-suite/ci

      - name: Spec decision guard
        run: python ../scripts/spec_decision_guard.py --output-dir ../artifacts/spec-decision-guard/ci

      - name: Upload backend handoff artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-handoff-artifacts
          path: |
            artifacts/readiness/ci
            artifacts/local-handoff/ci
            artifacts/validation-suite/ci
            artifacts/spec-decision-guard/ci
            artifacts/demo-data/ci
          if-no-files-found: ignore

      - name: Alembic smoke test
        env:
          DATABASE_URL: sqlite+aiosqlite:///./ci_alembic.db
        run: |
          alembic upgrade head
          test -f ci_alembic.db

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E smoke
        run: npm run test:e2e

      - name: Upload frontend test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-test-artifacts
          path: |
            frontend/test-results
            frontend/playwright-report
          if-no-files-found: ignore

  public-safety:
    name: Public Safety Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run public-safety scan
        shell: bash
        run: bash ./scripts/public_safety_scan.sh
