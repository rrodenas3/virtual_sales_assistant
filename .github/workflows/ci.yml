name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend
        run: pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check backend tests alembic ../mcp ../scripts/run_eval.py ../scripts/validate_live_data_contracts.py ../scripts/pilot_readiness_report.py

      - name: Test
        run: python -m pytest tests -q

      - name: Local eval harness
        run: python ../scripts/run_eval.py

      - name: Local readiness report
        run: python ../scripts/pilot_readiness_report.py --target local

      - name: Live data contract manifest
        run: python ../scripts/validate_live_data_contracts.py --manifest-only

      - name: Alembic smoke test
        env:
          DATABASE_URL: sqlite+aiosqlite:///./ci_alembic.db
        run: |
          alembic upgrade head
          test -f ci_alembic.db

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E smoke
        run: npm run test:e2e

  public-safety:
    name: Public Safety Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run public-safety scan
        shell: bash
        run: bash ./scripts/public_safety_scan.sh
